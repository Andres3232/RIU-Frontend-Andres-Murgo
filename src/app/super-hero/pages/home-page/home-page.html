<div class="container mx-auto p-6">
  <h1 class="text-3xl font-bold mb-2">Super Hero App</h1>
  <h3 class="text-base-content/70 mb-4">
    Total of heroes:
    <span class="badge badge-accent">{{ filteredHeroes().length }}</span>
  </h3>

  <div class="divider"></div>

  <div class="flex flex-wrap gap-4 items-center mb-6">
    <input
      type="text"
      placeholder="Find hero by name..."
      class="input input-bordered w-full max-w-xs"
      [value]="searchTerm()"
      (input)="onSearch($event)"
    />

    <app-pagination
      [currentPage]="paginationService.currentPage()"
      [totalPages]="paginationService.totalPages()"
      (pageChange)="onPageChange($event)"
    />

    <div class="flex-1"></div>

    <button class="btn btn-primary" (click)="onAdd()">Add Hero</button>
  </div>
  <hero-list
    [heroes]="paginatedHeroes()"
    (delete)="removeHero($event)"
  />
</div>
